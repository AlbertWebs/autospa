<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-runtime" content="electron" />
    <title>AutoSpa Pro — Offline</title>
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./assets/app-8lTve3S6.css" />
    <link rel="stylesheet" href="./assets/app-D4-jI-EM.css" />
    <link rel="stylesheet" href="./shell.css" />
</head>
<body class="font-sans antialiased bg-slate-50 text-slate-900 dark:bg-brand-bg dark:text-slate-200">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed inset-y-0 left-0 z-50 flex w-64 flex-col border-r border-slate-800/80 bg-gradient-to-b from-slate-900 via-slate-900 to-slate-950 shadow-xl shadow-black/20">
            <div class="flex h-16 shrink-0 items-center gap-3 border-b border-slate-800/80 px-5">
                <img src="./logo.png" alt="AutoSpa Pro" width="40" height="40" class="h-10 w-10 rounded-xl border-2 border-white/90 bg-white object-contain" />
                <div class="min-w-0 flex-1">
                    <p class="truncate text-sm font-semibold text-white">AutoSpa Pro</p>
                    <p class="truncate text-xs text-slate-400">Offline mode</p>
                </div>
            </div>

            <div class="flex min-h-0 flex-1 flex-col px-4 pt-4">
                <ul class="space-y-0.5">
                    <li class="px-3 pb-1 pt-2">
                        <span class="text-[10px] font-semibold uppercase tracking-widest text-indigo-300/80">Offline mode</span>
                    </li>
                    <li>
                        <button type="button" data-route="pos" class="nav-link group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-slate-300 transition-all duration-150 hover:bg-slate-800/60 hover:text-white">
                            <span class="nav-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-800 text-slate-400 transition-colors group-hover:bg-slate-700 group-hover:text-slate-200">
                                <span class="material-symbols-outlined text-[18px]">point_of_sale</span>
                            </span>
                            <span class="truncate">Point of Sale</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" data-route="live" class="nav-link group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-slate-300 transition-all duration-150 hover:bg-slate-800/60 hover:text-white">
                            <span class="nav-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-800 text-slate-400 transition-colors group-hover:bg-slate-700 group-hover:text-slate-200">
                                <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                            </span>
                            <span class="truncate">Live Wash Board</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" data-route="job-create" class="nav-link group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-slate-300 transition-all duration-150 hover:bg-slate-800/60 hover:text-white">
                            <span class="nav-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-800 text-slate-400 transition-colors group-hover:bg-slate-700 group-hover:text-slate-200">
                                <span class="material-symbols-outlined text-[18px]">assignment</span>
                            </span>
                            <span class="truncate">New Job Card</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" data-route="check-in" class="nav-link group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-slate-300 transition-all duration-150 hover:bg-slate-800/60 hover:text-white">
                            <span class="nav-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-800 text-slate-400 transition-colors group-hover:bg-slate-700 group-hover:text-slate-200">
                                <span class="material-symbols-outlined text-[18px]">garage</span>
                            </span>
                            <span class="truncate">Check In Vehicle</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" data-route="finance" class="nav-link group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-slate-300 transition-all duration-150 hover:bg-slate-800/60 hover:text-white">
                            <span class="nav-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-800 text-slate-400 transition-colors group-hover:bg-slate-700 group-hover:text-slate-200">
                                <span class="material-symbols-outlined text-[18px]">account_balance</span>
                            </span>
                            <span class="truncate">Finance</span>
                        </button>
                    </li>
                </ul>
            </div>

            <div class="space-y-2 border-t border-slate-800/80 p-4">
                <div id="sync-pill" class="rounded-full border border-amber-500/40 bg-amber-500/10 px-3 py-1.5 text-center text-xs font-semibold text-amber-300">Offline</div>
                <button type="button" id="btn-sync" class="asp-btn asp-btn-secondary w-full !py-2.5">Sync now</button>
                <button type="button" id="btn-online" class="asp-btn asp-btn-primary w-full !py-2.5">Back online</button>
            </div>
        </aside>

        <div class="flex flex-1 flex-col lg:pl-64">
            <header class="sticky top-0 z-30 border-b border-slate-300 bg-white/80 backdrop-blur-md dark:border-brand-border-subtle/80 dark:bg-brand-bg/80">
                <div class="border-b border-amber-200/80 bg-amber-50 px-4 py-2 text-sm text-amber-950 dark:border-amber-500/20 dark:bg-amber-500/10 dark:text-amber-100">
                    You are offline. Only essential tools are available — changes will upload when connection resumes.
                </div>
                <div class="flex h-16 items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
                    <div class="hidden sm:block">
                        <span class="text-sm font-medium text-slate-600 dark:text-slate-300" id="header-section">Sales</span>
                    </div>
                    <div id="toast" class="hidden rounded-xl border border-brand-primary/30 bg-brand-surface-high px-3 py-2 text-sm text-slate-200"></div>
                </div>
            </header>

            <main class="flex-1 p-4 sm:p-6 lg:p-8">
                <section id="view"></section>
            </main>
        </div>
    </div>
    <script src="./app.js"></script>
</body>
</html>
